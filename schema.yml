  /api/v1/admin/bookings/:
    get:
      operationId: v1_admin_bookings_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: payment_status
        schema:
          type: string
          enum:
          - failed
          - paid
          - pending
          - refunded
        description: |-
          * `pending` - Pending
          * `paid` - Paid
          * `failed` - Failed
          * `refunded` - Refunded
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - cancelled
          - completed
          - confirmed
          - created
          - delivery
          - paid
          - pending_payment
        description: |-
          * `created` - Created
          * `pending_payment` - Pending Payment
          * `paid` - Paid
          * `confirmed` - Confirmed
          * `delivery` - Delivery
          * `active` - Active
          * `completed` - Completed
          * `cancelled` - Cancelled
      - in: query
        name: user
        schema:
          type: integer
      - in: query
        name: vehicle
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
